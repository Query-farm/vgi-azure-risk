name: CI

on:
  push:
    branches: [main]
    paths-ignore: ['README.md']
  pull_request:
    branches: [main]
    paths-ignore: ['README.md']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Install, own-source typecheck, and bun unit tests (shared reusable workflow).
  ci:
    uses: Query-farm/vgi-actions/.github/workflows/ts-ci.yml@main

  # Metadata-quality gate (vgi-lint): scores the worker's catalog/schema/function/view
  # docs, tags, categories, per-arg docs, result schemas, and examples, and fails on any
  # finding at info or above. execute:false keeps it deterministic and credential-free —
  # the three risk table functions (risky_users, risky_service_principals, risk_detections)
  # each require a live app-only azure_graph secret and a network call to Microsoft Graph
  # Identity Protection (plus an Entra ID P2 license) to return rows, so the VGI9xx
  # live-scan rules can't run without tenant credentials; the browsable, credential-free
  # `risk_collections` view and the LIMIT-0 executable examples cover the static surface.
  # No version pin: @v1 resolves the latest published vgi-lint-check.
  lint:
    name: metadata quality (vgi-lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install worker dependencies
        run: bun install --frozen-lockfile
      - name: vgi-lint
        uses: Query-farm/vgi-lint-check@v1
        with:
          location: "bun run ${{ github.workspace }}/src/worker.ts"
          fail-on: info
          execute: "false"
